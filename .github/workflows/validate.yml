name: validate
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: claude plugin validate (best-effort)
        run: |
          if command -v claude >/dev/null 2>&1; then
            claude plugin validate .
            claude plugin validate ./plugins/materia
          else
            echo "claude CLI not available on this runner — skipping plugin validate."
          fi
        continue-on-error: true
      - name: install busybox + gawk (check-docs portability lanes)
        run: sudo apt-get update && sudo apt-get install -y busybox-static gawk
      - run: node scripts/validate-plugin.mjs
